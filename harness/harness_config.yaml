harness:
  transcript_dir: "D:\\Claude\\harness"
  transcript_file: "latest_session.jsonl"
  transcript_source: "scripts/get_last_session.py"
  db_path: "D:\\Claude\\harness\\state.db"

observer:
  min_tool_calls_for_skill: 8
  min_content_length_for_skill: 3000
  patterns:
    correction:
      - "不对"
      - "不是这样"
      - "应该是"
      - "错了"
      - "改一下"
      - "纠正"
      - "那个不对"
      - "你忘了我之前说过的"
    preference:
      - "以后都"
      - "我总是"
      - "帮我记住"
      - "我习惯"
      - "我的偏好"
      - "记住"
      - "默认"
      - "下次"

prethink:
  signal_weights:
    blocking: 15
    correction: 10
    preference: 8
    recent_errors_bonus: 20
    last_action_bonus: 10
    multi_tool_bonus: 5
    recent_errors_threshold: 3
    multi_tool_threshold: 5
  risk_tiers:
    high: 25
    medium: 12
    exploration: 5
  budget:
    recurring_failure_blocking: 38
    correction_blocking: 35
    recurring_failure_efficiency: 25
    correction_efficiency: 20
    exploration_efficiency: 18
    exploration_enhancement: 10
    preference_enhancement: 8
    routine_enhancement: 5
    default: 10

refiner:
  enabled: true
  model: "deepseek-v4-pro"

injector:
  enabled: true
  max_fragments: 3
  min_confidence: 0.6
  max_failure_patterns: 5
  max_total_lines: 40
  preflight_enabled: true
  preflight_max_lines: 5

vector_db:
  enabled: false
  backend: "chroma"
  model: "all-MiniLM-L6-v2"

mcp_wrapper:
  enabled: false
  wrapper_path: "D:\\Claude\\harness\\mcp_wrapper.py"
  pid_dir: "D:\\Claude\\harness\\.wrapper_pids"

evolution:
  auto_activate: false
  require_review: true

mind_theory:
  enabled: true
  embedding_model: "all-MiniLM-L6-v2"
  cosine_gate:
    threshold: 0.4
    injection_max_lines: 5
  attention:
    initial_alphas:
      user_msg: 0.20
      claude_behavior: 0.20
      session_tags: 0.20
      history_summary: 0.20
      memory_entries: 0.20
    learning_rate_initial: 0.01
    learning_rate_decay: 0.001
    decay_sessions: 50
    archive_threshold: 0.05
    archive_consecutive_sessions: 10
  session_quality:
    w_context_used: 0.15
    w_user_correction: 0.55
    w_session_completed: 0.15
    w_domain_hit_rate: 0.15
  omega:
    rule_first: true
    classifier_min_examples: 10
  psi:
    k_neighbors: 5
    max_interaction_pairs: 1000
