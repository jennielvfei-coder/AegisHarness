harness:
  transcript_dir: "D:\\Claude\\harness"
  transcript_file: "latest_session.jsonl"
  mcp_bridge: true
  db_path: "D:\\Claude\\harness\\state.db"
  # Phase 2: Use MCP memory session_summary entities as primary signal source.
  # Current memory.jsonl stores knowledge-graph relations — low signal.
  # MCP session summaries contain ❓Request/💡Learned/✅Completed — ideal for skill extraction.

observer:
  # MCP session summaries contain 2-4 entries per session (significantly less than raw transcripts).
  # Lower thresholds accordingly — quality over quantity for MCP data.
  min_tool_calls_for_skill: 1
  min_content_length_for_skill: 500
  skip_trivial_sessions: false
  patterns:
    correction:
      - "不对"
      - "不是这样"
      - "应该是"
      - "错了"
      - "改一下"
      - "纠正"
    preference:
      - "以后都"
      - "我总是"
      - "帮我记住"
      - "我习惯"
      - "我的偏好"
    new_workflow:
      - "怎么做"
      - "帮我想想"
      - "分析一下"
      - "审查"
      - "起草"

refiner:
  enabled: true
  model: "deepseek-v4-pro"

injector:
  enabled: false
  max_fragments: 3
  min_confidence: 0.6

evolution:
  auto_activate: false
  require_review: true
