harness:
  transcript_dir: "D:\\Claude\\harness"
  transcript_file: "latest_session.jsonl"
  transcript_source: "scripts/get_last_session.py"
  db_path: "D:\\Claude\\harness\\state.db"

observer:
  min_tool_calls_for_skill: 3
  min_content_length_for_skill: 1200
  patterns:
    correction:
      - "不对"
      - "不是这样"
      - "应该是"
      - "错了"
      - "改一下"
      - "纠正"
      - "那个不对"
      - "你忘了我之前说过的"
    preference:
      - "以后都"
      - "我总是"
      - "帮我记住"
      - "我习惯"
      - "我的偏好"
      - "记住"
      - "默认"
      - "下次"

refiner:
  enabled: true
  model: "deepseek-v4-pro"

injector:
  enabled: true
  max_fragments: 3
  min_confidence: 0.6

vector_db:
  enabled: false
  backend: "chroma"
  model: "all-MiniLM-L6-v2"

mcp_wrapper:
  enabled: true
  wrapper_path: "D:\\Claude\\harness\\mcp_wrapper.py"
  pid_dir: "D:\\Claude\\harness\\.wrapper_pids"

evolution:
  auto_activate: false
  require_review: true
