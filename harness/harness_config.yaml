observer:
  min_tool_calls_for_skill: 5
  skip_trivial_sessions: true
  patterns:
    correction:
      - "不对"
      - "不是这样"
      - "应该是"
      - "错了"
      - "改一下"
      - "纠正"
    preference:
      - "以后都"
      - "我总是"
      - "帮我记住"
      - "我习惯"
      - "我的偏好"
