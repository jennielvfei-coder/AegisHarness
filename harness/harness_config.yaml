harness:
  transcript_dir: "D:\\Claude\\harness"
  transcript_file: "latest_session.jsonl"
  transcript_source: "scripts/transcript_source.py"
  db_path: "D:\\Claude\\harness\\state.db"

observer:
  # Only trigger refiner (LLM call) for genuinely complex sessions.
  # Correction/preference patterns are always checked regardless of thresholds.
  min_tool_calls_for_skill: 5
  min_content_length_for_skill: 3000
  skip_trivial_sessions: true
  patterns:
    correction:
      - "不对"
      - "不是这样"
      - "应该是"
      - "错了"
      - "改一下"
      - "纠正"
    preference:
      - "以后都"
      - "我总是"
      - "帮我记住"
      - "我习惯"
      - "我的偏好"
    new_workflow:
      - "怎么做"
      - "帮我想想"
      - "分析一下"
      - "审查"
      - "起草"

refiner:
  enabled: true
  model: "deepseek-v4-pro"

injector:
  enabled: true
  max_fragments: 3
  min_confidence: 0.6

mcp_wrapper:
  enabled: true
  wrapper_path: "D:\\Claude\\harness\\mcp_wrapper.py"
  pid_dir: "D:\\Claude\\harness\\.wrapper_pids"

evolution:
  auto_activate: false
  require_review: true
